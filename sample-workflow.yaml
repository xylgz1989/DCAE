name: "Sample DCAE Workflow"
description: "A demonstration of the DCAE framework with BMAD roles and consensus validation"
project_type: "web_application"
discipline_level: "balanced"

steps:
  - role: "pm"
    task: "Analyze the requirements for a simple task management application. Identify key features, user personas, and success metrics."
    required_skills: ["requirements_analysis"]

  - role: "architect"
    task: "Design the system architecture for the task management application. Consider technology stack, database design, security, and scalability."
    required_skills: ["architectural_design", "brainstorming"]
    trigger_consensus: true  # Trigger multi-model consensus for architecture decisions

  - role: "developer"
    task: "Implement the core functionality of the task management application. Create the main data models, API endpoints, and basic UI components."
    required_skills: ["coding_plan", "tdd"]
    trigger_consensus: true  # Validate implementation with multi-model consensus

  - role: "developer"
    task: "Create unit tests and integration tests for the task management application. Ensure code coverage and proper error handling."
    required_skills: ["testing", "code_review"]
    trigger_consensus: true  # Validate tests with multi-model consensus

metadata:
  created_date: "2026-02-23"
  author: "DCAE Framework"
  version: "1.0"