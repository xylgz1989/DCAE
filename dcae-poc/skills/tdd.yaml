name: tdd
description: 强制测试驱动开发 (RED-GREEN-REFACTOR)
mandatory_for:
  - coding
  - developer

prompts:
  red: |
    ### RED 阶段 - 编写失败测试

    在编写任何实现代码之前，先编写测试用例。

    要求：
    1. 测试用例应该清晰描述预期行为
    2. 暂时不关心测试通过与否，先写出来
    3. 测试覆盖正常流程和边界情况

  green: |
    ### GREEN 阶段 - 编写最少的实现代码

    编写最少的代码使刚才编写的测试通过。

    要求：
    1. 只写让测试通过的最少代码
    2. 不要过度设计
    3. 保持代码简单直接

  refactor: |
    ### REFACTOR 阶段 - 重构代码

    在保持测试通过的前提下，重构代码。

    要求：
    1. 保持所有测试通过
    2. 提高代码可读性和可维护性
    3. 遵循最佳实践
    4. 提取重复代码
    5. 改善命名

instructions:
  - 严格遵循 RED-GREEN-REFACTOR 循环
  - 每次只处理一个小的功能点
  - 在每个阶段完成后确认测试状态
