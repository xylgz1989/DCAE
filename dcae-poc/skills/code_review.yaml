name: code_review
description: 强制代码审查，确保代码质量
mandatory_for:
  - coding
  - developer

prompts:
  review: |
    ### 代码审查

    请对以下代码进行全面审查。

    ### 审查维度：
    1. **正确性** - 逻辑是否正确，是否处理了边界情况
    2. **可读性** - 代码是否清晰易懂，命名是否恰当
    3. **性能** - 是否存在性能问题或可优化空间
    4. **安全性** - 是否存在安全隐患
    5. **可维护性** - 代码结构是否合理，是否易于维护
    6. **测试覆盖** - 测试是否充分

    ### 审查输出格式：
    ## 审查结果
    - 总体评分：[X/10]
    - 是否通过：[是/否]

    ## 发现的问题
    ### 🔴 严重问题
    - [问题描述]

    ### 🟡 需要改进
    - [改进建议]

    ### 🟢 优秀实践
    - [值得肯定的地方]

    ## 改进建议
    [具体的改进建议]

instructions:
  - 给出明确的通过/不通过判断
  - 区分严重问题和一般建议
  - 提供可操作的改进建议
  - 也要指出优秀的实践
