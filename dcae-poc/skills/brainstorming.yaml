name: brainstorming
description: 强制在架构设计前进行头脑风暴，生成多样化的解决方案
mandatory_for:
  - architect
  - analysis

prompts:
  initial: |
    在开始具体设计之前，请进行头脑风暴。

    ### 头脑风暴原则：
    1. **YES AND** - 在现有想法基础上扩展，不要否定
    2. **数量优先** - 生成多个不同的方案
    3. **暂不评判** - 先生成想法，稍后再评估
    4. **跨领域灵感** - 从其他领域借鉴思路

    ### 头脑风暴输出格式：
    ## 方案 A
    - 核心思路：
    - 优点：
    - 风险：

    ## 方案 B
    - 核心思路：
    - 优点：
    - 风险：

    ## 方案 C
    - 核心思路：
    - 优点：
    - 风险：

    ### 推荐方案
    综合比较后，推荐：[方案 X]
    理由：

instructions:
  - 生成至少 3 个不同的方案
  - 每个方案要有明确的优点和风险分析
  - 最后给出推荐方案和理由
